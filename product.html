<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CampusKart - Products</title>
    <link rel="stylesheet" href="css/products.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">
        🛒 CampusKart
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="#">Cart</a>
        <a href="#">Login</a>
    </nav>
</header>

<!-- FOOD SECTION -->
<section class="products">
    <h2>🍔 Food Products</h2>

    <div class="product-grid">

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h3>Milk</h3>
            <p>1 Litre</p>
            <span>₹60</span>
            <button>Add</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h3>Bread</h3>
            <p>400g</p>
            <span>₹40</span>
            <button>Add</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h3>Sandwich</h3>
            <p>1 Piece</p>
            <span>₹50</span>
            <button>Add</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h3>Cold Drink</h3>
            <p>500ml</p>
            <span>₹35</span>
            <button>Add</button>
        </div>

    </div>
</section>

<!-- MEDICAL SECTION -->
<section class="products">
    <h2>💊 Medical Products</h2>

    <div class="product-grid">

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h3>Paracetamol</h3>
            <p>10 Tablets</p>
            <span>₹20</span>
            <button>Add</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h3>ORS</h3>
            <p>Powder</p>
            <span>₹40</span>
            <button>Add</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h3>Bandage</h3>
            <p>1 Pack</p>
            <span>₹30</span>
            <button>Add</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <h3>Sanitizer</h3>
            <p>100ml</p>
            <span>₹55</span>
            <button>Add</button>
        </div>

    </div>
</section>

<footer>
    © 2026 CampusKart | All Rights Reserved
</footer>

</body>
</html>
