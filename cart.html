<!DOCTYPE html>
<html>
<head>
<title>Your Cart</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    padding:40px;
}

.container{
    background:white;
    padding:25px;
    border-radius:10px;
    max-width:600px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.item{
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #ddd;
    padding:10px 0;
}

button{
    background:red;
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:5px;
    cursor:pointer;
}

.total{
    font-size:20px;
    margin-top:20px;
    text-align:right;
    font-weight:bold;
}

.empty{
    text-align:center;
    color:gray;
    margin-top:30px;
}
</style>
</head>


<body>

<div class="container">

<h1>Your Cart 🛒</h1>

<div id="cart-items"></div>

<div class="total" id="total"></div>

</div>



<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let container = document.getElementById("cart-items");
let total = 0;

function renderCart(){
    container.innerHTML="";

    if(cart.length==0){
        container.innerHTML="<p class='empty'>Cart is empty</p>";
        document.getElementById("total").innerText="";
        return;
    }

    cart.forEach((item,index)=>{
        total += Number(item.price);

        container.innerHTML += `
        <div class="item">
            <span>${item.name} — ₹${item.price}</span>
            <button onclick="removeItem(${index})">Remove</button>
        </div>`;
    });

    document.getElementById("total").innerText="Total = ₹"+total;
}

function removeItem(i){
    cart.splice(i,1);
    localStorage.setItem("cart",JSON.stringify(cart));
    location.reload();
}

renderCart();
</script>

</body>
</html>
